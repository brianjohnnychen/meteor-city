<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Meteor City</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<!-- NOTE: when meteor.city custom domain is live, change /meteor-city/ paths below to / -->
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
<style>
  /* self-contained: 404 can be served at any path depth, so no external CSS */
  :root{--ink:#0a0c10;--soft:#4b5563;--sky:#69cdff;--skyt:#147cc0;--line:rgba(10,12,16,.12)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:#fff;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto;padding:0 32px}
  header{border-bottom:1px solid var(--line)}
  .nav{display:flex;align-items:center;height:64px}
  .wm{font-family:'Archivo',sans-serif;font-variation-settings:'wdth' 125;font-weight:800;letter-spacing:.14em;font-size:15px;text-transform:uppercase;display:flex;align-items:center;gap:10px;color:inherit;text-decoration:none}
  .wm .dot{width:9px;height:9px;border-radius:50%;background:var(--sky);box-shadow:0 0 0 3px #e8f6ff}
  main{padding:96px 0 120px}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--skyt);display:flex;align-items:center;gap:12px}
  .eyebrow::before{content:"";width:28px;height:1px;background:var(--skyt)}
  h1{font-family:'Archivo',sans-serif;font-variation-settings:'wdth' 118;font-weight:750;font-size:clamp(40px,6.4vw,84px);line-height:1.02;margin:24px 0 26px}
  h1 span{color:var(--skyt)}
  p{max-width:58ch;font-size:18px;line-height:1.7;color:var(--soft)}
  a.more{display:inline-flex;align-items:center;gap:10px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);text-decoration:none;border:1px solid rgba(10,12,16,.85);padding:12px 20px;margin-top:36px}
  a.more:hover{background:#e8f6ff;border-color:var(--skyt)}
  a.more::after{content:"→"}
</style>
</head>
<body>
<header><div class="wrap nav">
  <a href="/" class="wm"><span class="dot"></span>Meteor City</a>
</div></header>
<main><div class="wrap">
  <p class="eyebrow">Error · 404</p>
  <h1>No signal <span>here.</span></h1>
  <p>This page doesn't exist. The data would have told us to build it.</p>
  <a class="more" href="/">Back to the homepage</a>
</div></main>
</body>
</html>
